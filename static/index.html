<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        پروژه پردازش موازی | سعید حق نظری
    </title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

<div class="page-container">

    <!-- Header -->

    <header class="header">

        <h1>
            پروژه پایانی درس پردازش موازی
        </h1>

        <div class="student-name">
            🎓 سعید حق نظری
        </div>

    </header>

    <!-- Main Card -->

    <main class="main-card">

        <!-- Top Grid -->

        <section class="top-grid">

            <!-- Method -->

            <div class="form-card">

                <div class="card-title">
                    🔄 روش اجرا
                </div>

                <div class="radio-group">

                    <label class="radio-option">
                        <input
                            type="radio"
                            name="method"
                            value="thread"
                            checked
                        >
                        <span>🧵 Thread</span>
                    </label>

                    <label class="radio-option">
                        <input
                            type="radio"
                            name="method"
                            value="process"
                        >
                        <span>⚙️ Process</span>
                    </label>

                </div>

            </div>

            <!-- Tool -->

            <div class="form-card">

                <div class="card-title">
                    🛠️ ابزار همزمانی
                </div>

                <select dir="ltr" id="toolSelect"></select>

                <div class="info-box" id="toolInfo">
                    توضیحات ابزار
                </div>

            </div>

            <!-- Scenario -->

            <div class="form-card">

                <div class="card-title">
                    📋 سناریو
                </div>

                <select id="scenarioSelect"></select>

                <div
                    class="info-box"
                    id="scenarioInfo"
                >
                    توضیحات سناریو
                </div>

            </div>

        </section>

        <!-- Run Button -->

        <button
            class="btn-submit"
            id="submitBtn"
            onclick="runScenario()"
        >
            اجرای سناریو
        </button>

        <!-- Loading -->

        <div
            class="loading"
            id="loadingArea"
        >

            <div class="spinner"></div>

            <p>
                در حال اجرای سناریو...
            </p>

        </div>

        <!-- Result -->

        <section
            class="result-card"
            id="resultBox"
            style="display:none"
        >

            <div class="section-title">
                📤 خروجی الگوریتم
            </div>

            <div
                class="result-output"
                id="outputText"
                dir="ltr"
            ></div>

            <div class="section-title second-title">
                📖 توضیحات
            </div>

            <div
                class="result-explanation"
                id="explanationText"
            ></div>

        </section>

    </main>

    <!-- Footer -->

    <footer class="footer">

        📚 دانشکده فنی دانشگاه لرستان | بهار 1405

    </footer>

</div>

<script src="/static/js/tools.js"></script>
<script src="/static/js/scenarios.js"></script>
<script src="/static/js/script.js"></script>
</body>

</html>
