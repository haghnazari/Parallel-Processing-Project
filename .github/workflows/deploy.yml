name: CI/CD Pipeline

# این پایپ‌لاین با هر بار پش (Push) روی برنچ اصلی (main) فعال می‌شود
on:
  push:
    branches: [ "main" ]

jobs:
  # ۱. فاز تست و صحت‌سنجی کدها (CI)
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        echo "Running static analysis and syntax checks..."

  # ۲. فاز دیپلوی خودکار روی سرور از طریق کلید SSH (CD)
  deploy:
    needs: test-and-lint # فقط در صورت موفقیت فاز تست اجرا می‌شود
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to VPS via SSH Key
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}       # استفاده از کلید خصوصی ساخته‌شده به جای پسورد
        port: 22
        script: |
          # رفتن به پوشه صحیح پروژه روی سرور
          cd /root/Parallel-Processing-Project

          # دریافت آخرین تغییرات بدون تداخل
          git pull origin main

          # ساخت مجدد ایمیج و اجرای کانتینرها به صورت پس‌زمینه
          docker compose down
          docker compose up --build -d

          # بررسی نهایی وضعیت کانتینرها روی سرور
          docker ps